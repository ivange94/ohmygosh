<svg width="900" height="480" viewBox="0 0 900 480" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">ohmygosh terminal demo</title>
  <desc id="desc">A stylized terminal showing an interactive Go prompt running a few commands.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1020"/>
      <stop offset="0.55" stop-color="#111827"/>
      <stop offset="1" stop-color="#062f36"/>
    </linearGradient>
    <linearGradient id="bar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#1f2937"/>
      <stop offset="1" stop-color="#0f172a"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect width="900" height="480" rx="28" fill="url(#bg)"/>
  <g opacity="0.18">
    <path d="M88 88h724M88 158h724M88 228h724M88 298h724M88 368h724" stroke="#a7f3d0" stroke-width="1"/>
    <path d="M138 58v364M258 58v364M378 58v364M498 58v364M618 58v364M738 58v364" stroke="#93c5fd" stroke-width="1"/>
  </g>

  <g filter="url(#shadow)">
    <rect x="86" y="74" width="728" height="340" rx="16" fill="#020617"/>
    <rect x="86" y="74" width="728" height="44" rx="16" fill="url(#bar)"/>
    <path d="M86 102h728v18H86z" fill="url(#bar)"/>
    <circle cx="116" cy="96" r="7" fill="#fb7185"/>
    <circle cx="140" cy="96" r="7" fill="#facc15"/>
    <circle cx="164" cy="96" r="7" fill="#34d399"/>
    <text x="450" y="101" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13" fill="#cbd5e1">ohmygosh</text>

    <g font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="22">
      <text x="122" y="158" fill="#38bdf8">go&gt;</text>
      <text x="178" y="158" fill="#e5e7eb">import "fmt"</text>

      <text x="122" y="204" fill="#38bdf8">go&gt;</text>
      <text x="178" y="204" fill="#e5e7eb">name := "Go"</text>

      <text x="122" y="250" fill="#38bdf8">go&gt;</text>
      <text x="178" y="250" fill="#e5e7eb">fmt.Println("hello", name)</text>

      <text x="178" y="296" fill="#86efac">hello Go</text>

      <text x="122" y="342" fill="#38bdf8">go&gt;</text>
      <text x="178" y="342" fill="#fbbf24">/exit</text>
    </g>
  </g>

  <g transform="translate(606 354)">
    <rect width="150" height="34" rx="17" fill="#0f766e"/>
    <text x="75" y="23" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="14" font-weight="700" fill="#ecfeff">real Go, fast</text>
  </g>
</svg>
